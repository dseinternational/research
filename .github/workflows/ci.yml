name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  spellcheck:
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "25"

      - name: Install dependencies
        run: npm ci

      - name: Run spellcheck
        run: npm run spellcheck

      - name: Check formatting
        run: npm run format:check

  build-python:
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v7.0.0


      - name: Setup Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.14"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build wheel
        working-directory: src/python
        run: |
          python -m build

  test-python:
    strategy:
      fail-fast: false
      matrix:
        # Native Windows is intentionally omitted: jax/jaxlib have no conda-forge
        # win-64 build, so the compiled stack cannot solve there. Windows users work
        # in Ubuntu on WSL (linux-64), which the ubuntu runner covers.
        os: [ubuntu-26.04, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Setup conda environment
        uses: mamba-org/setup-micromamba@v3.0.0
        with:
          environment-file: environment.yml
          cache-environment: true
          cache-downloads: true

      - name: Verify environment core matches the canonical spec
        run: dse-check-env environment.yml

      - name: Run pytest
        working-directory: src/python
        run: pytest
