# Canonical conda-forge "compiled core" for DSE data-science repositories.
#
# This is the single source of truth for the *binary* layer of the hybrid
# environment model. Every repo's environment.yml must pin these packages, from
# conda-forge, to identical specs so the compiled scientific stack cannot drift
# across repos. The pure-Python tail and the shared library are installed in the
# pip layer (dse-research-utils[...] extras); repo-specific compiled add-ons
# (e.g. the gradient-boosting stack lightgbm/xgboost/shap, or the columnar-data
# stack polars/pyarrow/duckdb/pyreadstat) are declared in each repo on top of
# this core.
#
# Verify a repo against this file with:  dse-check-env path/to/environment.yml
#
# Keep these floors consistent with dse-research-utils' own dependency floors in
# pyproject.toml. No GPU/CUDA packages here — the base is CPU-only and
# cross-platform (macOS incl. arm64, Linux, WSL, Windows); GPU acceleration is an
# opt-in overlay (environment-gpu.yml).
channels:
  - conda-forge
dependencies:
  - python=3.14.6
  # --- core numerics (compiled) ---
  - numpy>=2.4.6,<2.5 # numba 0.65.1 requires numpy <2.5; lift the cap when numba supports 2.5
  - scipy>=1.18.0
  - pandas>=3.0.3
  - numba>=0.65.1
  - matplotlib>=3.11.0
  - scikit-learn>=1.9.0
  - statsmodels>=0.14.6
  # --- Bayesian modelling stack ---
  - pymc>=6.0.1 # pulls pytensor + a C toolchain from conda-forge
  - nutpie>=0.16.11
  - numpyro>=0.21.0
  - jax>=0.10.2 # CPU build; GPU acceleration via environment-gpu.yml
  - arviz>=1.2.0
  - arviz-base>=1.2.0
  - arviz-stats>=1.2.0
  - arviz-plots>=1.2.0
  - preliz>=0.27.0
  # --- serialization / storage (system libraries) ---
  - h5py>=3.12.0
  - h5netcdf>=1.3.0
  # --- graph rendering (system Graphviz) ---
  - graphviz>=14.1.2
  - python-graphviz>=0.20
