name: dse-research
channels:
  - conda-forge
dependencies:
  # ── shared conda-forge compiled core ──────────────────────────────────────
  # Single source of truth: src/python/src/dse_research_utils/data/environment-core.yml
  # These lines must match that spec exactly. Verify with:
  #   dse-check-env environment.yml
  - python=3.14.6
  - numpy>=2.4.6,<2.5 # numba 0.65.1 requires numpy <2.5; lift the cap when numba supports 2.5
  - scipy>=1.18.0
  - pandas>=3.0.3
  - numba>=0.65.1
  - matplotlib>=3.11.0
  - scikit-learn>=1.9.0
  - statsmodels>=0.14.6
  - pymc>=6.0.1 # pulls pytensor + a C toolchain from conda-forge
  - nutpie>=0.16.11
  - numpyro>=0.21.0
  - jax>=0.10.2 # CPU build; GPU acceleration via environment-gpu.yml
  - arviz>=1.2.0
  - arviz-base>=1.2.0
  - arviz-stats>=1.2.0
  - arviz-plots>=1.2.0
  - preliz>=0.27.0
  - h5py>=3.12.0
  - h5netcdf>=1.3.0
  - graphviz>=14.1.2
  - python-graphviz>=0.20
  # ── research add-ons (compiled / columnar data / system binaries) ─────────
  - lightgbm>=4.6.0
  - xgboost>=3.3.0
  - shap>=0.52.0
  - pyarrow>=24.0.0
  - polars>=1.42.1
  - duckdb>=1.5.4
  - pyreadstat>=1.3.5
  - xarray>=2026.4.0
  - zarr
  - networkx
  - pandoc
  - pip
  - pip:
      # This repo installed editable, with the shared extras. This pulls the
      # library's own runtime deps (azure-identity/-storage-blob, psutil, rich,
      # pyyaml, …) and the pure-Python tail (seaborn, ipython/jupyter, dcor,
      # optuna, orjson/tabulate) via the extras — no need to list them again.
      - -e ./src/python[viz,notebook,dependence,tuning,io]
      # research-only pure-Python
      - formulaic
      - mpmath
      - pingouin
      - plotly
      - pyxlsb
      # typing stubs + dev / build tooling
      - pandas-stubs
      - scipy-stubs
      - hatch
      - build
      - pytest>=9.1.1
      - ruff>=0.15.20
      - setuptools>=82.0.1
